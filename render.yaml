services:
  - type: web
    runtime: python
    name: candy-crush
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      # Render filesystems can be ephemeral between deploys/restarts.
      # Point SQLite to a writable path.
      - key: SQLITE_DB_PATH
        value: /tmp/candy_crush.db

